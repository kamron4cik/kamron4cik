version: '3.9'

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: kamronbek-portfolio:latest
    container_name: kamronbek-portfolio
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: local dev with hot reload
  portfolio-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: kamronbek-portfolio-dev
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    environment:
      - NODE_ENV=development
    profiles:
      - dev
